name: dr
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pytorch
  - torchvision
  - torchaudio
  - pytorch-cuda=12.1
  - pip
  - pip:
      - -r requirements-droid-drrobot-any4d.txt
      - -e .
      - -e ../Any4D
      # AllTracker (Harley et al., ICCV 2025) inference-only deps. The repo
      # itself is cloned to ../alltracker and imported via sys.path inside
      # scripts/extract_alltracker_tracks.py — no editable install needed.
      - scikit-image>=0.22
      - einops>=0.8
      - imageio-ffmpeg
